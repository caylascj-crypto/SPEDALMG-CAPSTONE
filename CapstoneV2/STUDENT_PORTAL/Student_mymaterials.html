<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>SPED ALM - My Materials</title>
  <link href="../STUDENT_CSS/Student_mymaterials.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;family=Nunito:wght@400;600;700;800;900&amp;display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
</head>

<body>
  <!-- SIDEBAR -->
  <aside class="student-sidebar">
    <div class="student-sidebar-logo">
      <img alt="SPED ALM Logo" class="student-sidebar-logo-img" src="../ASSETS/logo.png" />
      <div class="student-sidebar-logo-text">
        <span class="student-sidebar-title">SPED ALM</span>
        <span class="student-sidebar-sub">Student Portal</span>
      </div>
    </div>
    <nav class="student-sidebar-nav">
      <a class="student-nav-item" href="Student_dashboard.html">
        <i>🏠</i>
        <span>Dashboard</span>
      </a>
      <a class="student-nav-item student-active" href="Student_mymaterials.html">
        <i>📚</i>
        <span>My Materials</span>
        <i class="student-nav-arrow">›</i>
      </a>
      <a class="student-nav-item" href="Student_progress.html">
        <i>⭐</i>
        <span>My Progress</span>
      </a>
      <a class="student-nav-item" href="Student_settings.html">
        <i>⚙️</i>
        <span>Settings</span>
      </a>
    </nav>
    <div class="student-sidebar-footer">
      <div class="student-sidebar-user">
        <div class="student-user-avatar" id="sidebarInitials">JS</div>
        <div class="student-user-info">
          <span class="student-user-name" id="sidebarName">Juan Santos</span>
          <span class="student-user-role" id="sidebarRole">Grade 4 — ASD</span>
        </div>
      </div>
      <a class="student-signout-btn" href="../ADMIN_FILES/login_screen.html" onclick="sessionStorage.clear();">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Sign Out</span>
      </a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="student-main">
    <!-- PAGE HEADER -->
    <header class="student-page-header">
      <div class="student-page-headline">
        <span class="student-page-mascot">🐼</span>
        <div>
          <h1 class="student-page-title">My Materials</h1>
          <p class="student-page-sub">Learning activities prepared by your teacher <span class="student-sub-star">⭐</span></p>
        </div>
      </div>
      <div class="student-header-actions">
        <button class="student-fullview-btn" id="fullviewBtn" type="button">⛶ Full view</button>
        <a class="student-notif-btn" href="Student_notif.html">
          <i class="fa-regular fa-bell"></i>
          <span class="student-notif-badge" id="notifBadge" style="display:none"></span>
        </a>
      </div>
    </header>

    <!-- FILTER ROW -->
    <div class="student-filter-row">
      <div class="student-search-box">
        <span>🔍</span>
        <input id="searchInput" name="search_activities" placeholder="Search activities..." type="text" />
      </div>
      <div class="student-filter-tabs">
        <button class="student-ftab student-active" data-filter="all" type="button">All</button>
        <button class="student-ftab" data-filter="completed" type="button">Completed</button>
        <button class="student-ftab" data-filter="new" type="button">New</button>
      </div>
    </div>

    <!-- STAT CARDS -->
    <div class="student-stat-cards">
      <div class="student-stat-card student-stat-card--blue">
        <span class="student-stat-icon">📘</span>
        <div>
          <div class="student-stat-number student-stat-number--blue" id="statTotal">0</div>
          <div class="student-stat-label">Total Materials</div>
        </div>
      </div>
      <div class="student-stat-card student-stat-card--green">
        <span class="student-stat-icon">✅</span>
        <div>
          <div class="student-stat-number student-stat-number--green" id="statCompleted">0</div>
          <div class="student-stat-label">Completed</div>
        </div>
      </div>
      <div class="student-stat-card student-stat-card--orange">
        <span class="student-stat-icon">🚀</span>
        <div>
          <div class="student-stat-number student-stat-number--orange" id="statNew">0</div>
          <div class="student-stat-label">New / Pending</div>
        </div>
      </div>
    </div>

    <!-- GRADING SECTIONS (rendered by JS) -->
    <div id="gradingSections"></div>

  </main>

  <script>
    var TYPE_COLOR = { 'Matching': 'purple', 'Sorting': 'blue', 'Sequencing': 'green' };
    var COLOR_CYCLE = ['orange', 'blue', 'purple', 'green', 'amber', 'pink'];

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getBadge(deadline) {
      if (!deadline) return { text: 'NEW', cls: 'student-mat-badge--new' };
      var d = new Date(deadline + 'T23:59:59');
      var now = new Date();
      if (d < now) return { text: 'CLOSED', cls: 'student-mat-badge--closed' };
      var diff = Math.ceil((d - now) / (1000 * 60 * 60 * 24));
      if (diff <= 1) return { text: 'DUE TODAY', cls: 'student-mat-badge--due' };
      return { text: 'NEW', cls: 'student-mat-badge--new' };
    }

    function getTypeEmoji(type) {
      if (type === 'Matching') return '🔗';
      if (type === 'Sorting') return '🧩';
      if (type === 'Sequencing') return '📋';
      return '📄';
    }

    function renderCard(act, idx, prog) {
      var color = TYPE_COLOR[act.type] || COLOR_CYCLE[idx % COLOR_CYCLE.length];
      var progRec = prog.find(function(r){ return r.pubId === act.id; });
      var completed = !!progRec;
      var badge = completed
        ? { text: 'COMPLETED', cls: 'student-mat-badge--completed' }
        : getBadge(act.deadline);
      var pct = completed ? progRec.percent : 0;
      var thumb = act.thumbnail
        ? '<img src="' + esc(act.thumbnail) + '" alt="thumbnail" style="width:80px;height:80px;object-fit:cover;border-radius:12px;" />'
        : '<span style="font-size:48px;">' + getTypeEmoji(act.type) + '</span>';
      var dueText = act.deadline
        ? '<div class="student-mat-deadline">📅 Due: ' +
          new Date(act.deadline + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
          '</div>'
        : '';
      var btnLabel = completed ? '🔁 Review' : '&#9654; Start';
      var btnStyle = completed ? 'background:#7c3aed;box-shadow:0 3px 0 #5b21b6;' : '';
      return [
        '<div class="student-material-card student-mat--' + color + '" data-id="' + esc(act.id) + '" data-status="' + (completed ? 'completed' : 'new') + '">',
        '<span class="student-mat-badge ' + badge.cls + '">' + badge.text + '</span>',
        '<span class="student-mat-star">&#9734;</span>',
        '<div class="student-mat-card-thumb">' + thumb + '</div>',
        '<div class="student-mat-card-title">' + esc(act.title) + '</div>',
        '<div class="student-mat-card-tag">' + esc(act.type) + '</div>',
        dueText,
        '<div class="student-mat-progress">',
        '<div class="student-mat-progress-bar"><div class="student-mat-progress-fill" style="width:' + pct + '%;background:' + (completed ? '#16a34a' : '') + '"></div></div>',
        '<span class="student-mat-progress-pct">' + pct + '%</span>',
        '</div>',
        '<button class="student-mat-card-btn" type="button" style="' + btnStyle + '" onclick="startActivity(\'' + esc(act.id) + '\',\'' + esc(act.type) + '\')">' + btnLabel + '</button>',
        '</div>'
      ].join('');
    }

    function renderGradingSection(grading, items, prog) {
      var num = { First: '1st', Second: '2nd', Third: '3rd' };
      var countText = items.length === 0 ? '— items' : items.length + (items.length === 1 ? ' item' : ' items');
      var listId = 'list-' + grading.toLowerCase();
      var cards = items.length === 0
        ? '<div class="student-mat-empty">📭 No materials yet for this grading period.</div>'
        : items.map(function (a, i) { return renderCard(a, i, prog); }).join('') +
          '<div class="student-cheer"><span class="student-cheer-panda">🐼</span>' +
          '<div class="student-cheer-bubble"><strong>Great job!</strong><span>Keep learning and have fun! 💗</span></div>' +
          '<p class="student-cheer-text">Small steps every day lead to big progress!</p>' +
          '<span class="student-cheer-rainbow">🌈</span></div>';
      return [
        '<div class="student-grading-section">',
        '<div class="student-grading-header">',
        '<span class="student-grading-icon">📖</span>',
        '<span class="student-grading-title">' + num[grading] + ' Grading</span>',
        '<div class="student-grading-divider"></div>',
        '<span class="student-grading-count" id="count-' + grading.toLowerCase() + '">' + countText + '</span>',
        '</div>',
        '<div class="student-material-list" id="' + listId + '">' + cards + '</div>',
        '</div>'
      ].join('');
    }

    function loadMaterials() {
      var all = [];
      try { all = JSON.parse(localStorage.getItem('published_activities') || '[]'); } catch (e) {}
      var prog = [];
      try { prog = JSON.parse(localStorage.getItem('student_progress') || '[]'); } catch (e) {}

      var completedCount = all.filter(function(a){ return prog.some(function(r){ return r.pubId === a.id; }); }).length;
      document.getElementById('statTotal').textContent = all.length;
      document.getElementById('statNew').textContent = all.length - completedCount;
      document.getElementById('statCompleted').textContent = completedCount;

      var sections = ['First', 'Second', 'Third'].map(function (g) {
        var items = all.filter(function (a) { return a.grading === g; });
        return renderGradingSection(g, items, prog);
      }).join('');
      document.getElementById('gradingSections').innerHTML = sections;

      // update notif badge
      var notifs = [];
      try { notifs = JSON.parse(localStorage.getItem('student_notifications') || '[]'); } catch (e) {}
      var unread = notifs.filter(function (n) { return !n.isRead; }).length;
      var badge = document.getElementById('notifBadge');
      if (unread > 0) { badge.textContent = unread > 9 ? '9+' : unread; badge.style.display = 'flex'; }
      else { badge.style.display = 'none'; }

      // sync profile from settings
      var sp = {};
      try { sp = JSON.parse(localStorage.getItem('student_profile') || '{}'); } catch (e) {}
      var spFirst = (sp.firstName || 'Juan').trim();
      var spLast  = (sp.lastName  || 'Santos').trim();
      document.getElementById('sidebarName').textContent = [spFirst, spLast].filter(Boolean).join(' ');
      document.getElementById('sidebarRole').textContent = sp.grade || 'Grade 4';
      var matAv = document.getElementById('sidebarInitials');
      if (matAv) matAv.innerHTML = sp.photo
        ? '<img src="' + sp.photo + '" style="width:100%;height:100%;object-fit:cover;display:block;" />'
        : ((spFirst[0]||'J') + (spLast[0]||'S')).toUpperCase();
    }

    // Filter tabs
    document.querySelectorAll('.student-ftab').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.student-ftab').forEach(function (b) { b.classList.remove('student-active'); });
        btn.classList.add('student-active');
      });
    });

    // Full-view toggle
    var fvBtn = document.getElementById('fullviewBtn');
    fvBtn.addEventListener('click', function () {
      document.body.classList.toggle('student-fullview');
      var on = document.body.classList.contains('student-fullview');
      fvBtn.textContent = on ? '✕ Exit full view' : '⛶ Full view';
    });

    var TPL_MAP = {
      'Matching':   '../TEACHER_FILES/TEMPLATES/Matching_Type_Template.html',
      'Sorting':    '../TEACHER_FILES/TEMPLATES/Sorting_Type_Template.html',
      'Sequencing': '../TEACHER_FILES/TEMPLATES/Sequencing_Type_Template.html'
    };
    function startActivity(pubId, type) {
      var tpl = TPL_MAP[type];
      if (!tpl) { alert('Activity type not supported yet.'); return; }
      sessionStorage.setItem('stu_return_url', window.location.href);
      window.location.href = tpl + '?student_mode=1&pub_id=' + encodeURIComponent(pubId);
    }

    // Reload when teacher publishes while student tab is visible
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden) loadMaterials();
    });

    loadMaterials();
  </script>
</body>

</html>
