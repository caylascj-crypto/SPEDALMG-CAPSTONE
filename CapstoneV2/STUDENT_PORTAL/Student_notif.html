<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>SPED ALM - Notifications</title>
  <link href="../STUDENT_CSS/Student_notif.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;family=Nunito:wght@400;600;700;800;900&amp;display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
</head>

<body>
  <!-- SIDEBAR -->
  <aside class="student-sidebar">
    <div class="student-sidebar-logo">
      <img alt="SPED ALM Logo" class="student-sidebar-logo-img" src="../ASSETS/logo.png" />
      <div class="student-sidebar-logo-text">
        <span class="student-sidebar-title">SPED ALM</span>
        <span class="student-sidebar-sub">Student Portal</span>
      </div>
    </div>
    <nav class="student-sidebar-nav">
      <a class="student-nav-item" href="Student_dashboard.html">
        <i>🏠</i>
        <span>Dashboard</span>
      </a>
      <a class="student-nav-item" href="Student_mymaterials.html">
        <i>📚</i>
        <span>My Materials</span>
      </a>
      <a class="student-nav-item" href="Student_progress.html">
        <i>⭐</i>
        <span>My Progress</span>
      </a>
      <a class="student-nav-item" href="Student_settings.html">
        <i>⚙️</i>
        <span>Settings</span>
      </a>
    </nav>
    <div class="student-sidebar-footer">
      <div class="student-sidebar-user">
        <div class="student-user-avatar">JS</div>
        <div class="student-user-info">
          <span class="student-user-name">Juan Santos</span>
          <span class="student-user-role">Grade 4 — ASD</span>
        </div>
      </div>
      <a class="student-signout-btn" href="../ADMIN_FILES/login_screen.html" onclick="sessionStorage.clear();">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Sign Out</span>
      </a>
    </div>
  </aside>
  <!-- MAIN -->
  <main class="student-main">
    <!-- PAGE HEADER -->
    <header class="student-page-header">
      <div class="student-page-header-left">
        <h1 class="student-page-title">Notifications 🔔</h1>
        <p class="student-page-sub" id="student-unreadCount">2 unread notifications</p>
      </div>
      <div class="student-page-actions">
        <button class="student-action-btn" onclick="markAllRead()" type="button">✓ Mark all read</button>
        <button class="student-action-btn student-action-btn--danger" onclick="clearAll()" type="button">🗑 Clear all</button>
      </div>
    </header>
    <!-- FILTER ROW -->
    <div class="student-filter-row">
      <div class="student-filter-tabs">
        <button class="student-ftab student-active" onclick="switchTab(this, 'all')" type="button">All Notifications</button>
        <button class="student-ftab" id="student-unreadTab" onclick="switchTab(this, 'unread')" type="button">Unread (2)</button>
      </div>
      <button class="student-mark-all-btn" onclick="markAllRead()" type="button">Mark All as Read</button>
    </div>
    <!-- NOTIFICATIONS LIST -->
    <div class=”student-notif-list” id=”student-notifList”></div>
  </main>
  <script>
    var currentTab = 'all';

    var EMPTY_HTML =
      '<div class=”student-notif-empty”>' +
      '<div class=”student-notif-empty-icon”>🔔</div>' +
      '<p class=”student-notif-empty-title”>No notifications yet</p>' +
      '<p class=”student-notif-empty-desc”>Notifications from activities, your teacher, and system updates will appear here once available.</p>' +
      '</div>';

    function timeAgo(isoStr) {
      if (!isoStr) return '';
      var diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
      if (diff < 60) return 'Just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 172800) return 'Yesterday';
      return new Date(isoStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function notifIcon(type) {
      if (type === 'new_activity') return { icon: '📚', cls: 'student-notif-icon--blue' };
      if (type === 'achievement')  return { icon: '⭐', cls: 'student-notif-icon--gold' };
      return { icon: '💬', cls: 'student-notif-icon--purple' };
    }

    function renderNotifs(notifs) {
      if (notifs.length === 0) {
        document.getElementById('student-notifList').innerHTML = EMPTY_HTML;
        return;
      }
      var html = notifs.map(function(n, i) {
        var ic = notifIcon(n.type);
        var unreadCls = n.isRead ? '' : ' unread';
        return '<div class=”notif-item' + unreadCls + '” data-idx=”' + i + '”>' +
          '<div class=”student-notif-icon ' + ic.cls + '”>' + ic.icon + '</div>' +
          '<div class=”student-notif-body”>' +
            '<div class=”student-notif-row1”>' +
              '<span class=”student-notif-title”>' + n.title + '</span>' +
              '<span class=”student-notif-time”>' + timeAgo(n.createdAt) + '</span>' +
            '</div>' +
            '<p class=”student-notif-text”>' + n.message + '</p>' +
          '</div>' +
          (n.isRead
            ? '<button class=”mark-read-btn” disabled type=”button”>Read</button>'
            : '<button class=”mark-read-btn” onclick=”markOne(this,' + i + ')” type=”button”>Mark read</button>') +
          '</div>';
      }).join('');
      document.getElementById('student-notifList').innerHTML = html;
    }

    function loadNotifs() {
      var notifs = [];
      try {
        var _raw = JSON.parse(localStorage.getItem('student_notifications') || '[]');
        notifs = Array.isArray(_raw) ? _raw : [];
      } catch(e) {}
      try { renderNotifs(notifs); } catch(e) {
        document.getElementById('student-notifList').innerHTML = EMPTY_HTML;
      }
      recount();
    }

    function recount() {
      var n = document.querySelectorAll('.notif-item.unread').length;
      document.getElementById('student-unreadCount').textContent = n + ' unread notification' + (n === 1 ? '' : 's');
      document.getElementById('student-unreadTab').textContent = 'Unread (' + n + ')';
      applyFilter();
    }

    function applyFilter() {
      document.querySelectorAll('.notif-item').forEach(function(el) {
        var hide = (currentTab === 'unread' && !el.classList.contains('unread'));
        el.style.display = hide ? 'none' : 'flex';
      });
    }

    function switchTab(btn, tab) {
      document.querySelectorAll('.student-ftab').forEach(function(b) { b.classList.remove('student-active'); });
      btn.classList.add('student-active');
      currentTab = tab;
      applyFilter();
    }

    function markOne(btn, idx) {
      var notifs = [];
      try { notifs = JSON.parse(localStorage.getItem('student_notifications') || '[]'); } catch(e) {}
      if (notifs[idx]) notifs[idx].isRead = true;
      try { localStorage.setItem('student_notifications', JSON.stringify(notifs)); } catch(e) {}
      var item = btn.closest('.notif-item');
      item.classList.remove('unread');
      btn.textContent = 'Read';
      btn.disabled = true;
      recount();
    }

    function markAllRead() {
      var notifs = [];
      try { notifs = JSON.parse(localStorage.getItem('student_notifications') || '[]'); } catch(e) {}
      notifs.forEach(function(n) { n.isRead = true; });
      try { localStorage.setItem('student_notifications', JSON.stringify(notifs)); } catch(e) {}
      document.querySelectorAll('.notif-item.unread').forEach(function(el) { el.classList.remove('unread'); });
      document.querySelectorAll('.mark-read-btn').forEach(function(btn) { btn.textContent = 'Read'; btn.disabled = true; });
      recount();
    }

    function clearAll() {
      try { localStorage.setItem('student_notifications', '[]'); } catch(e) {}
      document.getElementById('student-notifList').innerHTML = EMPTY_HTML;
      document.getElementById('student-unreadCount').textContent = '0 unread notifications';
      document.getElementById('student-unreadTab').textContent = 'Unread (0)';
    }

    document.addEventListener('visibilitychange', function() { if (!document.hidden) loadNotifs(); });
    loadNotifs();
  </script>
</body>

</html>
